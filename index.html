<!DOCTYPE html>
<html lang="zh-TW" dir="ltr">

<head>
    <meta charset="utf-8">
    <title>中華花藝</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:site" content="@中華花藝">
    <meta name="twitter:image" content="http://www.florist.org.tw/images/logo-wide.png">
    <meta property="og:locale" content="zh-TW">
    <meta property="og:type" content="website">
    <meta property="og:title" content="中華花藝">
    <meta property="og:description" content="中華花藝-選擇畢業展花型">
    <meta property="og:url" content="http://www.florist.org.tw/">
    <meta property="og:site_name" content="中華花藝">
    <meta property="og:image" content="http://www.florist.org.tw/images/logo-wide.png">
    <link rel="shortcut icon" href="http://www.florist.org.tw/images/favicon.png">
    <link rel="apple-touch-icon" href="http://www.florist.org.tw/images/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.16.24/dist/css/uikit.min.css" />
    <style>
        html {
            font-size: 20px;
        }

        h4 {
            color: #fff !important;
        }

        .uk-checkbox,
        .uk-radio {
            width: 1.25rem;
            height: 1.25rem;
            margin-top: 0;
        }

        /* 載入區塊樣式調整 */
        .onloading {
            min-height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #666;
        }

        #canBeChooseDatas,
        #chosenDatas {
            transition: opacity .25s ease-in;
            opacity: 0;
        }

        #canBeChooseDatas.animateShow,
        #chosenDatas.animateShow {
            opacity: 1;
        }

        #chosenDatasWrapper {
            width: 400px;
            max-width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: #fff;
            box-shadow: 0 0 2rem rgba(0, 0, 0, .25);
            z-index: 100; /* 確保浮動在最上層 */
        }

        .uk-label {
            width: 4.5rem;
        }

        .secContainer {
            padding-bottom: 100px;
        }

        #btnSubmit {
            position: fixed;
            bottom: 0;
            left: 12%;
            z-index: 99;
        }

        #btnSubmit:disabled {
            background: #ccc;
            color: #fff;
            cursor: not-allowed;
        }

        @media screen and (max-width:700px) {
            #btnSubmit {
                left: 0;
                width: 100%; /* 手機版按鈕填滿寬度更好按 */
            }
        }

        @media screen and (max-width:414px) {
            h4 {
                text-align: center;
            }
            #btnSubmit {
                bottom: 220px;
                left: 50%;
                transform: translate(-50%, 10px);
                width: 90%;
            }
            .secContainer {
                padding-bottom: 300px;
            }
        }

        @media screen and (max-width:480px) {
            #chosenDatasWrapper {
                width: 100vw;
            }
        }
    </style>
</head>

<body>
    <div>
        <h4 class="uk-background-primary uk-light uk-padding-small">中華花藝-選擇2026畢業展花型</h4>
        <header class="uk-container uk-container-small">
            <div class="uk-column-1-2@s">
                <div class="uk-margin-small-bottom uk-flex uk-flex-middle">
                    <label class="uk-width-auto uk-margin-right uk-text-primary"
                        for="form-horizontal-name">請輸入您的大名</label>
                    <div class="uk-form-controls uk-flex-1">
                        <input class="uk-input uk-width-1-1" id="form-horizontal-name" type="text" placeholder="...">
                    </div>
                </div>
                <div class="uk-margin-small-bottom uk-flex uk-flex-middle">
                    <label class="uk-width-auto uk-margin-right uk-text-primary"
                        for="form-horizontal-no">請輸入會員編號</label>
                    <div class="uk-form-controls uk-flex-1">
                        <input class="uk-input uk-width-1-1" id="form-horizontal-no" type="text" inputmode="numeric" maxlength="7" placeholder="...">
                    </div>
                </div>
                <div class="uk-margin-small-bottom uk-flex uk-flex-middle">
                    <label class="uk-width-auto uk-margin-right uk-text-primary"
                        for="form-horizontal-session">您是第幾屆的呢</label>
                    <div class="uk-form-controls uk-flex-1">
                        <input class="uk-input uk-width-1-1" id="form-horizontal-session" type="text" placeholder="...">
                    </div>
                </div>
            </div>

            <div class="uk-margin-small-bottom uk-margin-top uk-flex uk-flex-middle">
                <label class="uk-width-auto uk-margin-right uk-text-primary">可以選的花型有<span
                        id="countCanBeChooseDatas"></span></label>
            </div>
        </header>
        
        <section class="uk-container uk-container-small secContainer">
            <div class="uk-overflow-auto">
                <table class="uk-table uk-table-hover uk-table-middle uk-table-divider">
                    <thead></thead>
                    <tbody id="tableLoading" class="onloading">
                        <tr>
                            <td class="uk-text-center uk-border-remove">
                                <div uk-spinner></div>
                                <div class="uk-margin-small-top">花型更新中...</div>
                            </td>
                        </tr>
                    </tbody>
                    <tbody id="canBeChooseDatas" class="uk-hidden"></tbody>
                </table>
            </div>
            
            <div class="uk-text-center">
                <button id="btnSubmit" class="uk-button uk-button-large uk-button-primary uk-hidden">確定送出</button>
            </div>

            <div id="chosenDatasWrapper" class="uk-position-fixed uk-position-bottom-right uk-flex uk-flex-column">
                <span class="uk-label uk-margin-left uk-margin-top">有人選過的</span>
                <div id="listLoading" class="onloading uk-margin-left uk-margin-bottom uk-margin-small-top">
                    <div uk-spinner="ratio: 0.8"></div>
                </div>
                <ul id="chosenDatas" class="uk-list uk-list-divider uk-margin-remove-top uk-padding-small uk-flex-1 uk-overflow-auto uk-hidden">
                </ul>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/uikit@3.16.24/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.16.24/dist/js/uikit-icons.min.js"></script>

    <script>
        const apiAllData = 'https://script.google.com/macros/s/AKfycbzcwvL8OPJUjPLV9aMVLP4Wfpslwb_0iAj59pG8YHRCFsgVzoAlZTSB2LLZCbfiLeh-2w/exec';
        const apiChosenData = 'https://script.google.com/macros/s/AKfycbzFVWXI8D2_A3jrQ8oCwmRBIT1SEYzC4Hh5LiGhwOjsQNu97d5rQqicd2vdgJahaU8h/exec';
        const apiPostData = 'https://script.google.com/macros/s/AKfycbwlUqVwFkWktWJBVd2sWym7_G6NG5wlV-XGq-PX2ol6jd8mPWnkEXW3Fycb_oMC_Dw/exec';
        
        const elName = document.querySelector('#form-horizontal-name');
        const elNo = document.querySelector('#form-horizontal-no');
        const elSession = document.querySelector('#form-horizontal-session');
        const elSubmit = document.querySelector('#btnSubmit');
        const elCanBeChooseDatas = document.querySelector('#canBeChooseDatas');
        const elCount = document.querySelector('#countCanBeChooseDatas');
        const elChosenDatas = document.querySelector('#chosenDatas');
        const elLoadings = document.querySelectorAll('.onloading');

        // 初始化載入資料
        initData();

        elSubmit.addEventListener('click', async () => {
            const nameVal = elName.value.trim();
            const noVal = elNo.value.trim();
            const sessionVal = elSession.value.trim();

            if (!nameVal) return alertFocus('請輸入您的大名', elName);
            if (!noVal) return alertFocus('請輸入會員編號', elNo);
            
            // 檢查是否重複報名
            const hasRepeat = [...document.querySelectorAll('.author')].some(x => x.textContent === noVal);
            if (hasRepeat) {
                alert('您已經填過了喔\n若要取消上次選的花型，請致電教學組\n\n02-2758-5222#22');
                return;
            }

            if (!sessionVal) return alertFocus('請輸入您是第幾屆的呢', elSession);

            const selectedFlowerEl = document.querySelector('[name=flower]:checked');
            if (!selectedFlowerEl) {
                alert('請選擇一種花型');
                return;
            }

            alert('資料送出中，請稍候...');
            await postData(nameVal, noVal, sessionVal, selectedFlowerEl.value);
        });

        // 輔助函式：跳出警告並聚焦輸入框
        function alertFocus(msg, element) {
            alert(msg);
            element.focus();
        }

        async function postData(name, no, session, flower) {
            elSubmit.disabled = true;
            elSubmit.textContent = '送出中...';

            const params = new URLSearchParams({
                no: no,
                session: session,
                name: name,
                flower: flower,
                timestamp: new Date().toISOString()
            });

            try {
                const response = await fetch(`${apiPostData}?${params.toString()}`);
                const jsonRes = await response.json();
                
                alert(jsonRes.result);
                
                // 清空表單
                elNo.value = '';
                elSession.value = '';
                elName.value = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                // 重新載入資料
                await initData();
            } catch (err) {
                console.error('Submit Error:', err);
                alert('資料送出失敗，請稍後再試。');
            } finally {
                elSubmit.disabled = false;
                elSubmit.textContent = '確定送出';
            }
        }
        
        async function initData() {
            toggleLoading(true);

            try {
                // 平行發送兩個請求，節省等待時間
                const [allDataRes, chosenDataRes] = await Promise.all([
                    fetch(apiAllData),
                    fetch(apiChosenData)
                ]);

                if (!allDataRes.ok || !chosenDataRes.ok) throw new Error('API 請求失敗');

                const aryAllData = await allDataRes.json();
                const chosenData = await chosenDataRes.json();

                renderData(aryAllData, chosenData);
            } catch (err) {
                console.error('Fetch Error:', err);
                alert('載入花型資料失敗，請重新整理頁面。');
            } finally {
                toggleLoading(false);
            }
        }

        function renderData(aryAllData, chosenData) {
            // 處理被選過的資料 (排除標題列)
            const reverseData = [...chosenData].reverse();
            // 扣除標題列的那一筆
            const validChosenData = reverseData.slice(1);

            // 1. 渲染：有人選過的花型清單
            elChosenDatas.innerHTML = validChosenData.map(x => `
                <li class="item-data uk-margin-remove uk-padding-remove">
                    【<span class="author">${x[1]}</span>】
                    <span class="flower">${x[4]}</span>
                </li>
            `).join('');

            // 取得已被選過的花型名稱陣列 (排除標題)
            const chosenFlowerNames = chosenData.slice(1).map(x => x[4]);

            // 2. 渲染：可以選的花型 (過濾掉已選)
            const availableFlowers = aryAllData.filter(x => !chosenFlowerNames.includes(x[0]));
            
            elCanBeChooseDatas.innerHTML = availableFlowers.map((x, index) => `
                <tr class="item-data">
                    <td class="uk-padding-remove">
                        <label class="uk-padding-small uk-flex uk-flex-middle" style="cursor: pointer;">
                            <input type="radio" class="uk-radio uk-margin-right" name="flower" value="${x[0]}" id="chk${index}" />
                            <span class="uk-flex-1">${x[0]}</span>
                        </label>
                    </td>
                </tr>
            `).join('');

            // 更新數量
            elCount.innerHTML = availableFlowers.length + (aryAllData.length ? ' 種：' : '');
        }

        /**
         * 控制載入動畫顯示隱藏
         * @param {boolean} isLoading - true=顯示載入中 || false=顯示資料
         */
        function toggleLoading(isLoading) {
            if (isLoading) {
                elLoadings.forEach(x => x.classList.remove('uk-hidden'));
                elCanBeChooseDatas.classList.add('uk-hidden', 'uk-animation-fade');
                elSubmit.classList.add('uk-hidden');
                elChosenDatas.classList.add('uk-hidden', 'uk-animation-fade');
            } else {
                elLoadings.forEach(x => x.classList.add('uk-hidden'));
                elCanBeChooseDatas.classList.remove('uk-hidden');
                elSubmit.classList.remove('uk-hidden');
                elChosenDatas.classList.remove('uk-hidden');
                
                // 加入淡入動畫效果
                setTimeout(() => {
                    elCanBeChooseDatas.classList.add('animateShow');
                    elChosenDatas.classList.add('animateShow');
                }, 50);
            }
        }
    </script>
</body>

</html>
